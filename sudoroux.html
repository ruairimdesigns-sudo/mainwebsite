<!doctype html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="https://use.typekit.net/blu2wnn.css">
        <link rel="stylesheet" href="style.css">
        <title>Ruairi Madine</title>
        <meta charset="UFT-8" name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="img/R1.png">
        <style>
            @keyframes left{
                0% {
                    transform: translate3d(0vw,50%,0) scale3d(2,2,1);
                    opacity: 70%;
                    animation-timing-function: ease-in;
                }
                60% {
                    transform: translate3d(50vw,50%,0) scale3d(2,2,1);
                    opacity: 70%;
                    animation-timing-function: ease-out;
                }
                100% {
                    transform: translate3d(50vw,50%,0) scale3d(3,3,1);
                    opacity: 0%;
                    animation-timing-function: ease-out;
                }
            }
            @keyframes right{
                0% {
                    transform: translate3d(100vw,50%,0) scale3d(2,2,1);
                    opacity: 70%;
                    animation-timing-function: ease-in;
                }
                60% {
                    transform: translate3d(50vw,50%,0) scale3d(2,2,1);
                    opacity: 70%;
                    animation-timing-function: ease-out;
                }
                100% {
                    transform: translate3d(50vw,50%,0) scale3d(3,3,1);
                    opacity: 0%;
                    animation-timing-function: ease-out;
                }
            }
        .circleleft {
            overflow: hidden;
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 500px;
            height: 500px;
            animation: left 2s;
            animation-fill-mode: forwards;
        }
        .circleright {
            overflow: hidden;
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 500px;
            height: 500px;
            animation: right 2s;
            animation-fill-mode: forwards;
        }
        </style>
    </head>
    <body>
        <nav>
            <ul class="whitetype">
                <li><a href="home">Work</a></li>
                <li><a href="about">About</a></li>
                <li><a href="contact">Contact</a></li>
                <li><a href="cv">C.V.</a></li>
                <li><a href="blog">Blog</a></li>
            </ul>
        </nav>
        <a href="home"><img class="logo" src="img/logowhite.png" alt=ruairi madine logo></a>
        <div style="width:100vw; height:100vh; background-color:#87827E">
            <div class="circleleft"></div>
            <div class="circleright"></div>
        </div>
    </body>
</html>
